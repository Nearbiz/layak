name: CI

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Migrations ──────────────────────────────────────────────────────────────
  migrate:
    name: Run migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: layak
          POSTGRES_PASSWORD: layak
          POSTGRES_DB: layak
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Run SQL migrations
        env:
          PGPASSWORD: layak
        run: |
          for f in migrations/*.sql; do
            echo "Applying $f..."
            psql -h localhost -U layak -d layak -f "$f"
          done

  # ── Go API ──────────────────────────────────────────────────────────────────
  go-api:
    name: Go API — build & vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/api/go.sum

      - name: Download dependencies
        working-directory: backend/api
        run: go mod download

      - name: Build
        working-directory: backend/api
        run: go build ./...

      - name: Vet
        working-directory: backend/api
        run: go vet ./...

  # ── FastAPI score service ────────────────────────────────────────────────────
  score-service:
    name: Score service — pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/score/requirements.txt

      - name: Install dependencies
        working-directory: backend/score
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend/score
        run: python -m pytest test_score.py -v

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── All green gate ────────────────────────────────────────────────────────────
  all-green:
    name: All green
    runs-on: ubuntu-latest
    needs: [migrate, go-api, score-service, frontend]
    steps:
      - run: echo "All CI checks passed."
